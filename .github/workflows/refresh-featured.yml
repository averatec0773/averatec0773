name: Refresh Featured Project Card

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:         # manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch repo metadata
        id: repo
        run: |
          DATA=$(curl -s https://api.github.com/repos/averatec0773/openclaw-discord-multiagent)
          DESC=$(echo "$DATA" | python3 -c "import json,sys; print(json.load(sys.stdin).get('description',''))")
          STARS=$(echo "$DATA" | python3 -c "import json,sys; print(json.load(sys.stdin).get('stargazers_count', 0))")
          echo "desc=$DESC" >> $GITHUB_OUTPUT
          echo "stars=$STARS" >> $GITHUB_OUTPUT

      - name: Regenerate SVG
        run: |
          python3 scripts/gen_featured.py "${{ steps.repo.outputs.desc }}" "${{ steps.repo.outputs.stars }}"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add featured-openclaw.svg
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: refresh featured card [skip ci]" &&
            git push
          )
